# ================================================================
#  InternSprint — application.properties
#  Local development config — uses your local MySQL
# ================================================================

# Server port
server.port=8080

# MySQL — local
spring.datasource.url=jdbc:mysql://localhost:3306/internsprint?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=pratik1011
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA — auto creates/updates tables from @Entity classes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# JWT secret key — change this to any long random string
jwt.secret=internsprint_secret_key_must_be_at_least_32_characters_long
jwt.expiration=86400000

# CORS — allow React frontend on port 3000
cors.allowed-origins=http://localhost:3000